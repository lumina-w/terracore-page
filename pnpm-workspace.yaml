# Reject dependency versions published less than 24h ago, matching the
# supply-chain policy Netlify enforces on the build image (pnpm's
# ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION). Keeping it here means local
# `pnpm install` resolves to the same policy-passing versions the deploy
# accepts, so a freshly published package never lands in the lockfile and
# breaks the build. Value is in minutes (1440 = 24h).
minimumReleaseAge: 1440

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lefthook: true
  sharp: true

overrides:
  # astro itself pulls unstorage -> @netlify/blobs -> @opentelemetry/core@2.7.1
  # (a session-storage driver, unrelated to the @astrojs/netlify adapter we
  # removed), vulnerable to GHSA-8988-4f7v-96qf. Force the patched line.
  '@opentelemetry/core': '>=2.8.0'
