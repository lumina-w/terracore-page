name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Format + Lint ────────────────────────────────────────────────
  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

  # ── Build ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      MAIN_CTA_URL: ${{ secrets.MAIN_CTA_URL }}
      CONTACT_WHATSAPP: ${{ secrets.CONTACT_WHATSAPP }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist size
        run: |
          SIZE=$(du -sm dist/ | cut -f1)
          echo "Build size: ${SIZE}MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "::warning::Build size ${SIZE}MB exceeds 50MB threshold"
          fi

  # ── Security audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high

      - name: Check for secrets in source
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
