name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege: el token solo necesita leer el código para lint/build/test.
permissions:
  contents: read

# Cancela runs superados del mismo ref (no gastar minutos en commits obsoletos).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format + Lint ────────────────────────────────────────────────
  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm run format:check

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

  # ── Build ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check dist size
        run: |
          SIZE=$(du -sm dist/ | cut -f1)
          echo "Build size: ${SIZE}MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "::warning::Build size ${SIZE}MB exceeds 50MB threshold"
          fi

  # ── E2E ──────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Security audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high + critical only)
        run: pnpm audit --audit-level=high

      - name: Check for secrets in source
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          extra_args: --only-verified
