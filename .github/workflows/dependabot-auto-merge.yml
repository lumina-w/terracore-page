name: Dependabot auto-merge

# Aprueba y activa auto-merge (squash) para PRs de Dependabot de tipo patch y
# minor. Los major NO se auto-mergean: requieren revisión humana.
#
# Requisitos en Settings para que funcione:
#   - "Allow auto-merge" habilitado en el repo.
#   - Branch protection / ruleset en main con los checks required (el merge
#     espera a que pasen antes de completarse).
on: pull_request

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge Dependabot (patch/minor)
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Approve and enable auto-merge
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
