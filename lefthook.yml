# Git hooks gestionados por lefthook.
# Se instalan solos al correr `pnpm install` (script `prepare` en package.json).
# Docs: docs/CONTRIBUTING.md

pre-commit:
  parallel: true
  commands:
    # Prettier respeta .prettierignore, así que salta BaseLayout.astro solo.
    prettier:
      glob: '*.{ts,js,mjs,cjs,astro,json,md,yml,yaml,css}'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    # BaseLayout.astro se edita a mano (is:inline); no pasa por eslint --fix.
    eslint:
      glob: '*.{ts,js,mjs,cjs,astro}'
      exclude:
        - 'src/layouts/BaseLayout.astro'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
